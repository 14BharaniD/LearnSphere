<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Payment</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .payment-card{

            border:none;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

        }

        .brand{

            color:#2563eb;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card payment-card">

                <div class="card-body p-4">

                    <h2 class="text-center brand">

                        <i class="bi bi-credit-card-fill"></i>

                        Payment

                    </h2>

                    <hr>

                    <div class="mb-3">

                        <strong>Course ID :</strong>

                        <span th:text="${course.courseId}"></span>

                    </div>

                    <div class="mb-3">

                        <strong>Course Name :</strong>

                        <span th:text="${course.courseName}"></span>

                    </div>

                    <div class="mb-4">

                        <strong>Course Price :</strong>

                        <span class="text-success fw-bold">

                            ₹ <span th:text="${course.coursePrice}"></span>

                        </span>

                    </div>

                    <div class="d-grid">
						<div class="alert alert-warning">

						    <i class="bi bi-info-circle-fill"></i>

						    Demo Payment:
						    No real money will be deducted.
						    Click <strong>Pay Now</strong> to simulate a successful payment.

						</div>
                        <a
                            th:href="@{/purchaseCourse(courseId=${course.courseId})}"
                            class="btn btn-success btn-lg"
                        >

                            <i class="bi bi-wallet2"></i>

                            Pay Now

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
