<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My Courses</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .brand{

            color:#2563eb;

            font-weight:bold;

        }

        .course-card{

            border:none;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

            transition:0.3s;

        }

        .course-card:hover{

            transform:translateY(-5px);

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center brand mb-5">

        <i class="bi bi-journal-bookmark-fill"></i>

        My Courses

    </h2>

    <div class="row g-4">

        <div
            class="col-md-4"
            th:each="course : ${courseList}"
        >

            <div class="card course-card h-100">

                <div class="card-body text-center">

                    <i
                        class="bi bi-book-half"
                        style="font-size:50px;color:#2563eb;"
                    ></i>

                    <h4
                        class="mt-3"
                        th:text="${course.courseName}"
                    ></h4>

                    <p class="text-muted">

                        Course ID :

                        <span
                            th:text="${course.courseId}"
                        ></span>

                    </p>

                    <h5 class="text-success">

                        ₹

                        <span
                            th:text="${course.coursePrice}"
                        ></span>

                    </h5>

                    <a
                        th:href="@{/viewLessons(courseId=${course.courseId})}"
                        class="btn btn-primary mt-3"
                    >

                        <i class="bi bi-play-circle-fill"></i>

                        Start Learning

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
