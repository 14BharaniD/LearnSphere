<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Lesson Comments</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .brand{

            color:#2563eb;

            font-weight:bold;

        }

        .comment-card{

            border:none;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

        }

        .comment-icon{

            font-size:35px;

            color:#2563eb;

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center brand mb-4">

        <i class="bi bi-chat-dots-fill"></i>

        Lesson Comments

    </h2>

    <div class="card comment-card">

        <div class="card-body">

            <div
                class="border rounded p-3 mb-3"
                th:each="comment : ${commentList}"
            >

                <div class="d-flex">

                    <div class="me-3">

                        <i class="bi bi-person-circle comment-icon"></i>

                    </div>

                    <div>

                        <h6>

                            Comment #

                            <span
                                th:text="${comment.commentId}"
                            ></span>

                        </h6>

                        <p
                            class="mb-0"
                            th:text="${comment.comment}"
                        ></p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
