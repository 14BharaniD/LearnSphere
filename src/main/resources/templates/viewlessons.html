<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>View Lessons</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .brand{

            color:#2563eb;

            font-weight:bold;

        }

        .lesson-card{

            border:none;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

            transition:0.3s;

        }

        .lesson-card:hover{

            transform:translateY(-5px);

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center brand mb-5">

        <i class="bi bi-play-circle-fill"></i>

        Course Lessons

    </h2>

    <div class="row g-4">

        <div
            class="col-md-6"
            th:each="lesson : ${lessonList}"
        >

            <div class="card lesson-card h-100">

                <div class="card-body">

                    <h4
                        th:text="${lesson.lessonName}"
                    ></h4>

                    <p class="text-muted">

                        Lesson ID :

                        <span
                            th:text="${lesson.lessonId}"
                        ></span>

                    </p>

                    <p>

                        <strong>Topics :</strong>

                        <span
                            th:text="${lesson.lessonTopics}"
                        ></span>

                    </p>

                    <div class="d-grid gap-2">

                        <a
                            th:href="${lesson.lessonLink}"
                            target="_blank"
                            class="btn btn-primary"
                        >

                            <i class="bi bi-play-fill"></i>

                            Watch Video

                        </a>

                    </div>

                    <hr>

                    <form
                        action="/addComment"
                        method="post"
                    >

                        <input
                            type="hidden"
                            name="lessonId"
                            th:value="${lesson.lessonId}"
                        >

                        <div class="mb-3">

                            <input
                                type="text"
                                name="commentId"
                                class="form-control"
                                placeholder="Comment ID"
                            >

                        </div>

                        <div class="mb-3">

                            <textarea
                                name="comment"
                                class="form-control"
                                rows="3"
                                placeholder="Write your comment..."
                            ></textarea>

                        </div>

                        <div class="d-grid">

                            <button
                                class="btn btn-success"
                            >

                                <i class="bi bi-chat-left-text-fill"></i>

                                Add Comment

                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-3">

                        <a
                            th:href="@{/viewComments(lessonId=${lesson.lessonId})}"
                            class="btn btn-outline-primary"
                        >

                            <i class="bi bi-chat-dots-fill"></i>

                            View Comments

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
