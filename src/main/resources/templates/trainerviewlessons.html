<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>View Lessons</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .page-title{

            color:#2563eb;

            font-weight:bold;

        }

        .table-card{

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center page-title mb-4">

        <i class="bi bi-collection-play-fill"></i>

        All Lessons

    </h2>

    <div class="table-card">

        <table
            class="table table-bordered table-hover text-center align-middle"
        >

            <thead class="table-primary">

                <tr>

                    <th>Lesson ID</th>

                    <th>Lesson Name</th>

                    <th>Topics</th>

                    <th>Course</th>

                    <th>Delete</th>

                    <th>Update</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="lesson : ${lessonList}">

                    <td th:text="${lesson.lessonId}"></td>

                    <td th:text="${lesson.lessonName}"></td>

                    <td th:text="${lesson.lessonTopics}"></td>

                    <td th:text="${lesson.course.courseName}"></td>

                    <td>

                        <a
                            th:href="@{/deleteLesson(lessonId=${lesson.lessonId})}"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Are you sure you want to delete this lesson?');"
                        >

                            <i class="bi bi-trash-fill"></i>

                            Delete

                        </a>

                    </td>

                    <td>

                        <a
                            th:href="@{/editLesson(lessonId=${lesson.lessonId})}"
                            class="btn btn-warning btn-sm"
                        >

                            <i class="bi bi-pencil-square"></i>

                            Update

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

        <div class="text-center mt-4">

            <a
                href="/trainerhome"
                class="btn btn-primary"
            >

                <i class="bi bi-arrow-left-circle"></i>

                Back to Dashboard

            </a>

        </div>

    </div>

</div>

</body>

</html>
