<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Add Lesson</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body{

            font-family:'Poppins',sans-serif;

            background:#f4f7fc;

        }

        .lesson-card{

            border:none;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.15);

        }

        .brand{

            color:#2563eb;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card lesson-card">

                <div class="card-body p-4">

                    <h2 class="text-center brand">

                        <i class="bi bi-play-circle-fill"></i>

                        Add New Lesson

                    </h2>

                    <hr>

                    <form action="/addLesson" method="post">

                        <div class="mb-3">

                            <label class="form-label">

                                Lesson ID

                            </label>

                            <input
                                type="number"
                                name="lessonId"
                                class="form-control"
                                placeholder="Enter Lesson ID"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Lesson Name

                            </label>

                            <input
                                type="text"
                                name="lessonName"
                                class="form-control"
                                placeholder="Enter Lesson Name"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Lesson Topics

                            </label>

                            <textarea
                                name="lessonTopics"
                                class="form-control"
                                rows="3"
                                placeholder="Enter Lesson Topics"
                                required
                            ></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Lesson Video Link

                            </label>

                            <input
                                type="url"
                                name="lessonLink"
                                class="form-control"
                                placeholder="Paste YouTube Video Link"
                                required
                            >

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Course ID

                            </label>

                            <input
                                type="number"
                                name="courseId"
                                class="form-control"
                                placeholder="Enter Course ID"
                                required
                            >

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                            >

                                <i class="bi bi-plus-circle"></i>

                                Add Lesson

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
